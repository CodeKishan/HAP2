# Render deployment configuration for CardioPredict Flask API
# Paste this content as render.yaml in your backend repo root
# OR configure manually in the Render dashboard

services:
  - type: web
    name: cardiopredict-api
    env: python
    plan: free          # upgrade to starter ($7/mo) for no spin-down
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
